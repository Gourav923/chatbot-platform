<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupportAI — Customer Support</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
         :root {
            --bg: #050810;
            --bg2: #080c18;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.09);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --accent: #7c6ff7;
            --accent2: #a78bfa;
            --accent3: #c4b5fd;
            --glow: rgba(124, 111, 247, 0.35);
            --glow2: rgba(124, 111, 247, 0.12);
            --text: #f0f2ff;
            --text2: #8b92b8;
            --text3: #3d4466;
            --bot-bubble: rgba(255, 255, 255, 0.05);
            --user-bubble: linear-gradient(135deg, #5b50d6, #7c6ff7);
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --radius: 20px;
            --font: "Inter", "Segoe UI", system-ui, sans-serif;
        }
        
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        /* Animated background
    blobs */
        
        body::before {
            content: "";
            position: fixed;
            top: -30%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient( circle, rgba(124, 111, 247, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: blobMove 12s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        
        body::after {
            content: "";
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient( circle, rgba(167, 139, 250, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: blobMove 16s ease-in-out infinite alternate-reverse;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes blobMove {
            from {
                transform: translate(0, 0) scale(1);
            }
            to {
                transform: translate(40px, 30px) scale(1.1);
            }
        }
        /* Header */
        
        .header {
            background: rgba(8, 12, 24, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 28px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .bot-avatar {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, #5b50d6, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(124, 111, 247, 0.4);
            position: relative;
        }
        
        .bot-avatar::after {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c6ff7, #c4b5fd);
            z-index: -1;
            opacity: 0.5;
            filter: blur(6px);
        }
        
        .bot-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        
        .bot-status {
            font-size: 12px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }
        
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 8px var(--success);
            }
            50% {
                opacity: 0.5;
                box-shadow: 0 0 3px var(--success);
            }
        }
        
        .header-right {
            display: flex;
            gap: 8px;
        }
        
        .header-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text2);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: var(--font);
            backdrop-filter: blur(10px);
        }
        
        .header-btn:hover {
            background: var(--glass-hover);
            color: var(--text);
            border-color: rgba(124, 111, 247, 0.4);
            box-shadow: 0 0 16px var(--glow2);
        }
        /* Chat area */
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
            position: relative;
            z-index: 1;
        }
        
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(124, 111, 247, 0.3);
            border-radius: 4px;
        }
        /* Messages */
        
        .msg-row {
            display: flex;
            gap: 12px;
            max-width: 720px;
            animation: fadeUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 11px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }
        
        .bot-msg-avatar {
            background: linear-gradient(135deg, #5b50d6, #a78bfa);
            box-shadow: 0 0 14px rgba(124, 111, 247, 0.35);
        }
        
        .user-msg-avatar {
            background: linear-gradient(135deg, #3730a3, #6366f1);
        }
        
        .bubble {
            padding: 13px 17px;
            border-radius: var(--radius);
            font-size: 14.5px;
            line-height: 1.65;
            max-width: 520px;
            word-break: break-word;
            font-weight: 400;
        }
        
        .bot .bubble {
            background: var(--bot-bubble);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            color: var(--text);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .user .bubble {
            background: var(--user-bubble);
            border-radius: var(--radius) 4px var(--radius) var(--radius);
            color: white;
            box-shadow: 0 4px 24px rgba(124, 111, 247, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
        }
        
        .msg-meta {
            font-size: 11px;
            color: var(--text3);
            margin-top: 5px;
            padding: 0 4px;
        }
        
        .intent-badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(124, 111, 247, 0.12);
            color: var(--accent3);
            padding: 3px 9px;
            border-radius: 20px;
            margin-top: 7px;
            border: 1px solid rgba(124, 111, 247, 0.2);
            font-weight: 500;
        }
        
        .handover-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 11px;
            padding: 9px 16px;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: #1a1000;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
            font-family: var(--font);
        }
        
        .handover-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.45);
        }
        /* Typing */
        
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: var(--bot-bubble);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            width: fit-content;
        }
        
        .typing span {
            width: 7px;
            height: 7px;
            background: var(--accent2);
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }
        
        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes bounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-7px);
                opacity: 1;
            }
        }
        /* Input bar */
        
        .input-bar {
            background: rgba(8, 12, 24, 0.9);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-top: 1px solid var(--glass-border);
            padding: 16px 24px 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        
        .input-wrap {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 780px;
            margin: 0 auto;
        }
        
        #userInput {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 13px 18px;
            border-radius: 14px;
            font-size: 14.5px;
            font-family: var(--font);
            resize: none;
            outline: none;
            max-height: 120px;
            transition: all 0.25s;
            line-height: 1.55;
            backdrop-filter: blur(12px);
        }
        
        #userInput:focus {
            border-color: rgba(124, 111, 247, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px var(--glow2), 0 0 24px var(--glow2);
        }
        
        #userInput::placeholder {
            color: var(--text3);
        }
        
        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: linear-gradient(135deg, #5b50d6, #7c6ff7);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
            box-shadow: 0 4px 20px var(--glow);
        }
        
        .send-btn:hover {
            transform: scale(1.08) translateY(-1px);
            box-shadow: 0 8px 28px var(--glow);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        .send-btn svg {
            width: 18px;
            height: 18px;
        }
        /* Quick replies */
        
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .qr-btn {
            background: rgba(124, 111, 247, 0.08);
            border: 1px solid rgba(124, 111, 247, 0.25);
            color: var(--accent3);
            padding: 7px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font);
            backdrop-filter: blur(8px);
        }
        
        .qr-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 16px var(--glow);
            transform: translateY(-1px);
        }
        /* System messages */
        
        .sys-msg {
            text-align: center;
            font-size: 12px;
            color: var(--text3);
            padding: 5px 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            align-self: center;
            backdrop-filter: blur(10px);
        }
        /* Welcome screen */
        
        .welcome {
            align-self: center;
            text-align: center;
            padding: 50px 28px;
            max-width: 460px;
        }
        
        .welcome-icon {
            font-size: 52px;
            margin-bottom: 18px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(124, 111, 247, 0.5));
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        
        .welcome h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff, var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .welcome p {
            font-size: 14.5px;
            color: var(--text2);
            line-height: 1.75;
            margin-bottom: 28px;
        }
        
        .welcome-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .chip {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text2);
            padding: 10px 18px;
            border-radius: 22px;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(12px);
            font-family: var(--font);
        }
        
        .chip:hover {
            border-color: rgba(124, 111, 247, 0.5);
            color: var(--accent3);
            background: rgba(124, 111, 247, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--glow2);
        }
        /* Notification toast */
        
        .notif {
            position: fixed;
            top: 24px;
            right: 24px;
            background: linear-gradient(135deg, #059669, #34d399);
            color: white;
            padding: 13px 20px;
            border-radius: 14px;
            font-size: 13.5px;
            font-weight: 600;
            z-index: 999;
            transform: translateY(-90px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 32px rgba(52, 211, 153, 0.35);
            font-family: var(--font);
        }
        
        .notif.show {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <div class="bot-avatar">🤖</div>
            <div>
                <div class="bot-name">SupportAI</div>
                <div class="bot-status">
                    <span class="status-dot"></span>Online — typically replies instantly
                </div>
            </div>
        </div>
        <div class="header-right">
            <a href="/admin" class="header-btn">⚙️ Admin</a>
            <button class="header-btn" onclick="clearChat()">🗑 Clear</button>
        </div>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">💬</div>
            <h2>Hi! How can we help?</h2>
            <p>
                Ask me anything about your orders, payments, account, or technical issues. I'm here 24/7.
            </p>
            <div class="welcome-chips">
                <div class="chip" onclick="sendQuick('Track my order')">
                    📦 Track Order
                </div>
                <div class="chip" onclick="sendQuick('I need a refund')">
                    💰 Refund
                </div>
                <div class="chip" onclick="sendQuick('Technical issue')">
                    🔧 Tech Support
                </div>
                <div class="chip" onclick="sendQuick('Account help')">🔐 Account</div>
                <div class="chip" onclick="sendQuick('Shipping info')">
                    🚚 Shipping
                </div>
                <div class="chip" onclick="sendQuick('Talk to agent')">
                    👤 Live Agent
                </div>
            </div>
        </div>
    </div>

    <div class="input-bar">
        <div class="input-wrap">
            <textarea id="userInput" rows="1" placeholder="Type your message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" onclick="sendMessage()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
        </div>
    </div>

    <div class="notif" id="notif"></div>

    <script>
        const sessionId = "sess_" + Math.random().toString(36).substr(2, 9);
        const chatArea = document.getElementById("chatArea");
        let isTyping = false;

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 120) + "px";
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendQuick(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function removeWelcome() {
            const w = document.getElementById("welcome");
            if (w) w.remove();
        }

        function addMessage(role, text, meta = {}) {
            removeWelcome();
            const row = document.createElement("div");
            row.className = `msg-row ${role}`;

            const avatar = document.createElement("div");
            avatar.className = `msg-avatar ${role === "bot" ? "bot-msg-avatar" : "user-msg-avatar"}`;
            avatar.textContent = role === "bot" ? "🤖" : "👤";

            const right = document.createElement("div");
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;

            if (role === "bot" && meta.intent && meta.intent !== "unknown") {
                const badge = document.createElement("div");
                badge.className = "intent-badge";
                badge.textContent = `Intent: ${meta.intent} · ${meta.confidence}% confidence`;
                bubble.appendChild(document.createElement("br"));
                bubble.appendChild(badge);
            }

            if (meta.suggestHandover) {
                const btn = document.createElement("button");
                btn.className = "handover-btn";
                btn.innerHTML = "👤 Connect Live Agent";
                btn.onclick = requestHandover;
                bubble.appendChild(document.createElement("br"));
                bubble.appendChild(btn);
            }

            const timEl = document.createElement("div");
            timEl.className = "msg-meta";
            timEl.textContent = new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
            });

            right.appendChild(bubble);
            right.appendChild(timEl);
            row.appendChild(avatar);
            row.appendChild(right);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
            return row;
        }

        function addQuickReplies(replies) {
            const div = document.createElement("div");
            div.className = "quick-replies";
            div.style.paddingLeft = "42px";
            replies.forEach((r) => {
                const btn = document.createElement("button");
                btn.className = "qr-btn";
                btn.textContent = r;
                btn.onclick = () => {
                    div.remove();
                    sendQuick(r);
                };
                div.appendChild(btn);
            });
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const row = document.createElement("div");
            row.className = "msg-row bot";
            row.id = "typing-indicator";
            const av = document.createElement("div");
            av.className = "msg-avatar bot-msg-avatar";
            av.textContent = "🤖";
            const typing = document.createElement("div");
            typing.className = "typing";
            typing.innerHTML = "<span></span><span></span><span></span>";
            row.appendChild(av);
            row.appendChild(typing);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById("typing-indicator");
            if (t) t.remove();
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text || isTyping) return;

            input.value = "";
            input.style.height = "auto";
            isTyping = true;

            addMessage("user", text);
            showTyping();

            // Remove old quick replies
            document
                .querySelectorAll(".quick-replies")
                .forEach((el) => el.remove());

            await new Promise((r) => setTimeout(r, 600 + Math.random() * 600));

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: text,
                        sessionId,
                    }),
                });
                const data = await res.json();
                removeTyping();
                addMessage("bot", data.reply, {
                    intent: data.intent,
                    confidence: data.confidence,
                    suggestHandover: data.suggestHandover,
                });

                // Smart quick replies
                const qrMap = {
                    order_status: [
                        "Check another order",
                        "Contact support",
                        "Talk to agent",
                    ],
                    refund: [
                        "Start refund process",
                        "Check refund status",
                        "Talk to agent",
                    ],
                    greeting: ["Track my order", "I need a refund", "Technical help"],
                    unknown: ["Talk to live agent", "Try different question"],
                };
                if (qrMap[data.intent]) addQuickReplies(qrMap[data.intent]);
            } catch (e) {
                removeTyping();
                addMessage("bot", "Connection error. Please try again.", {});
            }
            isTyping = false;
        }

        async function requestHandover() {
            const name = prompt("Your name (optional):") || "Guest";
            try {
                const res = await fetch("/api/handover", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        sessionId,
                        userName: name,
                    }),
                });
                const data = await res.json();
                addMessage("bot", data.message, {});
                showNotif("✅ Added to agent queue!");
            } catch (e) {
                addMessage(
                    "bot",
                    "Could not connect to agent queue. Please try again.", {},
                );
            }
        }

        function clearChat() {
            chatArea.innerHTML = "";
            location.reload();
        }

        function showNotif(msg) {
            const n = document.getElementById("notif");
            n.textContent = msg;
            n.classList.add("show");
            setTimeout(() => n.classList.remove("show"), 3000);
        }
    </script>
</body>

</html>
